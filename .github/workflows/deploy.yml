name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Mirror repo root into main/ (rootDirectory=/main workaround)
        run: |
          mkdir -p main
          rsync -a --exclude=main/ --exclude=.git/ . main/
          echo "Files in main/:" && ls main/

      - name: Deploy to Railway
        run: railway up --detach --service render
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
