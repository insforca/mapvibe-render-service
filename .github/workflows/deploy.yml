name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Mirror repo root into main/ (Railway rootDirectory workaround)
        # Railway service is configured with rootDirectory=/main but no main/ exists.
        # Mirror all files into main/ so Railway finds main/Dockerfile, main/package.json, etc.
        # Once the rootDirectory is corrected to / in the Railway dashboard this step can be removed.
        run: |
          mkdir -p main
          rsync -a --exclude=main/ --exclude=.git/ . main/
          echo "main/ contents:" && ls main/

      - name: Deploy to Railway
        run: railway up --detach --service render
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
